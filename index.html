// ─── Date Helpers ─────────────────────────────────────────────────────────────
function addDays(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function isOverdue(dateStr) {
  return new Date(dateStr) < new Date(new Date().toDateString());
}
function fmtDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function Badge({ label, color = C.orange, textColor = C.white, small = false }) {
  return (
    <span style={{
      display: 'inline-block',
      background: color,
      color: textColor,
      borderRadius: 999,
      padding: small ? '2px 8px' : '4px 12px',
      fontSize: small ? 11 : 12,
      fontWeight: 600,
      letterSpacing: '0.02em',
    }}>
      {label}
    </span>
  );
}

function ChannelBadge({ channel }) {
  const map = {
    LinkedIn:  { bg: '#0A66C2', label: 'LinkedIn' },
    Email:     { bg: '#6B6B6B', label: 'Email' },
    Outreach:  { bg: C.orange,  label: 'Outreach' },
    Partner:   { bg: C.purple,  label: 'Partner' },
    Phone:     { bg: C.green,   label: 'Phone' },
    Text:      { bg: C.amber,   label: 'Text' },
  };
  const { bg, label } = map[channel] || { bg: '#ccc', label: channel };
  return <Badge label={label} color={bg} small />;
}

function ConfidenceBadge({ confidence }) {
  const map = {
    confirmed:     { bg: C.green,  label: 'Confirmed' },
    likely:        { bg: C.amber,  label: 'Likely' },
    'signal only': { bg: '#ccc',   label: 'Signal Only' },
  };
  const { bg, label } = map[confidence] || { bg: '#ccc', label: confidence };
  return <Badge label={label} color={bg} small />;
}

function Section({ title, children, style = {} }) {
  return (
    <div style={{ marginBottom: 32, ...style }}>
      {title && (
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: C.textMuted, marginBottom: 12 }}>
          {title}
        </div>
      )}
      {children}
    </div>
  );
}

function TaskList({ accountId, tasks }) {
  const key = `amp_tasks_${accountId}`;
  const [done, setDone] = useState(() => {
    try { return JSON.parse(localStorage.getItem(key)) || {}; } catch { return {}; }
  });

  const toggle = (id) => {
    setDone(prev => {
      const next = { ...prev, [id]: !prev[id] };
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const pending = tasks.filter(t => !done[t.id]);
  const completed = tasks.filter(t => done[t.id]);

  return (
    <div>
      {pending.length > 0 && (
        <Section title={`Pending (${pending.length})`}>
          {pending.map(t => (
            <div key={t.id} style={{
              background: C.white,
              border: `1px solid ${isOverdue(t.due) ? C.red : C.border}`,
              borderRadius: 10,
              padding: 14,
              marginBottom: 10,
              display: 'flex',
              gap: 12,
            }}>
              <input
                type="checkbox"
                checked={false}
                onChange={() => toggle(t.id)}
                style={{ marginTop: 3, accentColor: C.orange, width: 16, height: 16, cursor: 'pointer', flexShrink: 0 }}
              />
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{t.title}</div>
                <div style={{ fontSize: 13, color: '#444', lineHeight: 1.6, marginBottom: 8 }}>{t.description}</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <ChannelBadge channel={t.channel} />
                  <span style={{ fontSize: 11, color: isOverdue(t.due) ? C.red : C.textMuted, fontWeight: isOverdue(t.due) ? 700 : 400 }}>
                    Due: {fmtDate(t.due)}{isOverdue(t.due) ? ' — OVERDUE' : ''}
                  </span>
                </div>
              </div>
            </div>
          ))}
        </Section>
      )}
      {completed.length > 0 && (
        <Section title={`Completed (${completed.length})`}>
          {completed.map(t => (
            <div key={t.id} style={{
              background: '#F0FFF4',
              border: `1px solid ${C.green}40`,
              borderRadius: 10,
              padding: 14,
              marginBottom: 10,
              display: 'flex',
              gap: 12,
              opacity: 0.7,
            }}>
              <input
                type="checkbox"
                checked={true}
                onChange={() => toggle(t.id)}
                style={{ marginTop: 3, accentColor: C.green, width: 16, height: 16, cursor: 'pointer', flexShrink: 0 }}
              />
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 14, textDecoration: 'line-through', color: C.textMuted }}>{t.title}</div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>
                  <ChannelBadge channel={t.channel} />
                </div>
              </div>
            </div>
          ))}
        </Section>
      )}
      {tasks.length === 0 && (
        <div style={{ color: C.textMuted, fontSize: 14 }}>No tasks defined for this account.</div>
      )}
    </div>
  );
}
