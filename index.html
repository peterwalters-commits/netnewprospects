// ─── TASK LIST ───────────────────────────────────────────────────────────────
function TaskList({accountId,tasks}) {
  const key = `amp_tasks_${accountId}`;
  const [done,setDone] = useState(() => {
    try{return JSON.parse(localStorage.getItem(key))||{};}catch{return {};}
  });

  const toggle = id => {
    setDone(prev => {
      const next = {...prev,[id]:!prev[id]};
      localStorage.setItem(key,JSON.stringify(next));
      return next;
    });
  };

  const pending = tasks.filter(t=>!done[t.id]);
  const completed = tasks.filter(t=>done[t.id]);

  const TaskRow = ({t}) => {
    const over = !done[t.id] && isOverdue(t.due);
    return (
      <div style={{display:'flex',gap:14,alignItems:'flex-start',padding:'16px 0',borderBottom:`1px solid ${C.border}`,opacity:done[t.id]?0.5:1}}>
        <input type="checkbox" checked={!!done[t.id]} onChange={()=>toggle(t.id)} style={{marginTop:3}}/>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:4}}>
            <span style={{fontSize:15,fontWeight:done[t.id]?400:600,color:C.dark,textDecoration:done[t.id]?'line-through':'none'}}>{t.title}</span>
            <ChannelBadge ch={t.channel}/>
            {over && <span style={{fontSize:11,fontWeight:700,color:C.red}}>OVERDUE</span>}
          </div>
          <div style={{fontSize:13,color:C.textMuted,lineHeight:1.5,marginBottom:4}}>{t.description}</div>
          <div style={{fontSize:11,color:over&&!done[t.id]?C.amber:C.textMuted}}>Due {fmt(t.due)}</div>
        </div>
      </div>
    );
  };

  return (
    <div>
      {pending.length===0 && completed.length>0 && (
        <div style={{textAlign:'center',padding:'32px',color:C.green,fontWeight:700,fontSize:16}}>✅ All tasks complete</div>
      )}
      {pending.map(t=><TaskRow key={t.id} t={t}/>)}
      {completed.length>0 && pending.length>0 && (
        <div style={{fontSize:11,fontWeight:700,letterSpacing:'1px',color:C.textMuted,textTransform:'uppercase',margin:'20px 0 8px'}}>Completed</div>
      )}
      {completed.map(t=><TaskRow key={t.id} t={t}/>)}
    </div>
  );
}

          <h1 style={{color:C.white,fontSize:36,fontWeight:800,lineHeight:1.2,marginBottom:18,maxWidth:680}}>{acct.heroTitle}</h1>
          <p style={{color:'#BBBBBB',fontSize:17,lineHeight:1.7,maxWidth:640}}>{acct.heroSub}</p>

          {/* Tab bar */}
          <div style={{display:'flex',gap:8,marginTop:32,flexWrap:'wrap'}}>
            {['brief','tasks','one-pager'].map(t=>(
              <button key={t} className="tab-btn" style={tabStyle(tab===t)} onClick={()=>setTab(t)}>
                {t==='brief'?'Full Brief':t==='tasks'?`Tasks (${acct.tasks.length})`:'One-Pager'}
              </button>
            ))}
          </div>
        </div>
      </div>

      {tab==='tasks' && (
        <Section title="AE Tasks">
          <p style={{fontSize:14,color:C.textMuted,marginBottom:24}}>Task completion is saved in your browser. Check off each step as you go.</p>
          <TaskList accountId={acct.id} tasks={acct.tasks}/>
        </Section>
      )}

      {tab==='one-pager' && (
        <Section title="One-Pager Generator">
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:14,padding:32,maxWidth:640}}>
            <div style={{fontSize:22,fontWeight:800,color:C.dark,marginBottom:8}}>Generate a leave-behind for {acct.name}</div>
            <p style={{fontSize:14,color:C.textMuted,lineHeight:1.65,marginBottom:24}}>The <strong>account-and-products-one-pager</strong> skill generates a polished, account-personalized .docx file — branded with Amplitude blue, with product sections, specific use cases, and AI callouts. It researches the account first using Granola, Salesforce, Outreach, and web search before writing a word.</p>

            <div style={{background:C.grayLight,borderRadius:10,padding:20,marginBottom:24}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:C.orange,marginBottom:10}}>Products to include for {acct.name}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {acct.products_detail.map(p=>(
                  <span key={p.name} style={{background:C.orange,color:'#fff',borderRadius:6,padding:'4px 12px',fontSize:12,fontWeight:700}}>{p.name}</span>
                ))}
              </div>
            </div>

            <div style={{background:'#2962FF'+'0D',border:`1px solid #2962FF33`,borderRadius:10,padding:20,marginBottom:24}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:'#2962FF',marginBottom:8}}>Prompt to use in Claude</div>
              <div style={{fontFamily:'monospace',fontSize:13,color:C.dark,lineHeight:1.6,userSelect:'all'}}>
                Make a one-pager for {acct.name} featuring {acct.products_detail.map(p=>p.name).join(', ')}
              </div>
            </div>

            <p style={{fontSize:12,color:C.textMuted,lineHeight:1.5}}>The skill will ask you to confirm the account name and product selection, research the account, write personalized content, and deliver a .docx file you can open in Google Drive or share directly with the prospect.</p>
          </div>
        </Section>
      )}

      {tab==='brief' && <>
        {/* Stats */}
        <Section bg={C.grayLight}>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {acct.stats.map(s=>(
              <div key={s.label} style={{textAlign:'center',padding:'20px 28px',background:C.white,borderRadius:12,border:`1px solid ${C.border}`,flex:'1 1 140px'}}>
                <div style={{fontSize:28,fontWeight:800,color:C.orange,marginBottom:4}}>{s.value}</div>
                <div style={{fontSize:12,color:C.textMuted}}>{s.label}</div>
              </div>
            ))}
          </div>
        </Section>

        {/* Challenge */}
        <Section title="The Challenge">
          <h2 style={{fontSize:22,fontWeight:800,marginBottom:14}}>{acct.challengeTitle}</h2>
          <p style={{fontSize:15,color:C.textMuted,lineHeight:1.75,maxWidth:720}}>{acct.challengeBody}</p>
        </Section>

        {/* Tech Stack */}
        <Section title="Current Tech Stack" bg={C.grayLight}>
          <p style={{fontSize:14,color:C.textMuted,marginBottom:20}}>Confirmed and likely tools detected. Each represents a displacement or consolidation opportunity.</p>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:28}}>
            {acct.techStack.map(t=>(
              <div key={t.tool} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:10,padding:16,display:'flex',gap:16,alignItems:'flex-start'}}>
                <div style={{minWidth:120}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.dark,marginBottom:4}}>{t.tool}</div>
                  <div style={{fontSize:11,color:C.textMuted,marginBottom:6}}>{t.category}</div>
                  <ConfidenceBadge level={t.confidence}/>
                </div>
                <div style={{flex:1,borderLeft:`1px solid ${C.border}`,paddingLeft:16}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.5px',color:C.orange,marginBottom:4}}>Displacement angle</div>
                  <div style={{fontSize:13,color:C.dark,lineHeight:1.55}}>{t.displacement}</div>
                </div>
              </div>
            ))}
          </div>
          {acct.gaps.length>0 && (
            <>
              <div style={{fontSize:12,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:C.red,marginBottom:12}}>Confirmed Gaps — No Tool Detected</div>
              <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                {acct.gaps.map(g=>(
                  <div key={g.name} style={{background:C.red+'08',border:`1px solid ${C.red}33`,borderRadius:8,padding:'10px 16px',flex:'1 1 240px'}}>
                    <div style={{fontWeight:700,fontSize:13,color:C.red,marginBottom:4}}>{g.name}</div>
                    <div style={{fontSize:12,color:C.dark,lineHeight:1.5}}>{g.detail}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </Section>

        {/* Where Amplitude Fits */}
        <Section title="Where Amplitude Fits">
          <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
            {acct.features.map(f=>(
              <div key={f.title} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,padding:24,flex:'1 1 240px'}}>
                <div style={{fontSize:26,marginBottom:10}}>{f.icon}</div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:8,color:C.dark}}>{f.title}</div>
                <div style={{fontSize:13,color:C.textMuted,lineHeight:1.6}}>{f.body}</div>
              </div>
            ))}
          </div>
        </Section>

        {/* Suggested Contacts */}
        <Section title="Suggested Contacts — ZoomInfo" bg={C.grayLight}>
          <p style={{fontSize:14,color:C.textMuted,marginBottom:20}}>5 contacts ranked by MEDDICC priority. Click any row to see messaging POV. Verify names on LinkedIn before outreach — ZoomInfo data may lag role changes.</p>
          {acct.contacts.map(c=><ContactCard key={c.name} c={c}/>)}
        </Section>

        {/* Why Now */}
        <Section title="Why Now">
          <div style={{background:C.orange+'0D',border:`1px solid ${C.orange}33`,borderRadius:12,padding:28}}>
            {acct.whyNow.map((p,i)=>(
              <p key={i} style={{fontSize:15,lineHeight:1.8,color:C.dark,marginBottom:i<acct.whyNow.length-1?14:0}}>{p}</p>
            ))}
          </div>
        </Section>

        {/* Recommended Products */}
        <Section title="Recommended Products" bg={C.grayLight}>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
            {acct.products_detail.map(p=>(
              <div key={p.name} style={{flex:'1 1 220px',background:C.white,border:`1px solid ${C.border}`,borderRadius:12,padding:22}}>
                <div style={{display:'inline-block',background:C.orange,color:'#fff',borderRadius:6,padding:'4px 12px',fontSize:13,fontWeight:700,marginBottom:10}}>{p.name}</div>
                <p style={{fontSize:13,color:C.textMuted,lineHeight:1.6,margin:0}}>{p.desc}</p>
              </div>
            ))}
          </div>
        </Section>

        {/* CTA */}
        <div style={{background:C.dark,padding:'56px 32px',textAlign:'center'}}>
          <div style={{maxWidth:560,margin:'0 auto'}}>
            <h2 style={{color:C.white,fontSize:24,fontWeight:800,marginBottom:14}}>Ready to see it in action?</h2>
            <p style={{color:'#999',fontSize:15,marginBottom:28,lineHeight:1.6}}>We've built a tailored demo for {acct.name}. 30 minutes — no slide decks, just your data and your use cases.</p>
            <a href="https://amplitude.com/demo" target="_blank" rel="noreferrer" style={{background:C.orange,color:'#fff',padding:'12px 32px',borderRadius:8,fontWeight:700,fontSize:15,textDecoration:'none',display:'inline-block'}}>Book a 30-min Demo →</a>
          </div>
        </div>
      </>}
    </div>
  );
}

// ─── HOME PAGE ───────────────────────────────────────────────────────────────
function HomePage({setPage}) {
  return (
    <div style={{minHeight:'100vh',background:C.grayLight}}>
      <div style={{background:C.dark,padding:'72px 32px 64px',textAlign:'center'}}>
        <Badge text="Net-New Prospects Only · No Existing Customers"/>
        <h1 style={{color:C.white,fontSize:38,fontWeight:800,marginTop:18,marginBottom:14,lineHeight:1.2}}>Amplitude for your business.</h1>
        <p style={{color:'#999',fontSize:17,maxWidth:500,margin:'0 auto',lineHeight:1.6}}>Research briefs built around each prospect's specific use cases, tech stack, and buying signals.</p>
      </div>
      <div style={{maxWidth:900,margin:'0 auto',padding:'44px 32px',display:'flex',gap:24,flexWrap:'wrap'}}>
        {Object.values(ACCOUNTS).map(a=>(
          <div key={a.id} className="hover-lift" onClick={()=>setPage(a.id)}
            style={{flex:'1 1 340px',background:C.white,border:`1px solid ${C.border}`,borderRadius:16,padding:32,cursor:'pointer',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:C.textMuted,marginBottom:5}}>{a.industry}</div>
                <div style={{fontSize:22,fontWeight:800,color:C.dark}}>{a.name}</div>
              </div>
              <span style={{background:a.signalColor+'18',color:a.signalColor,border:`1px solid ${a.signalColor}33`,borderRadius:20,padding:'4px 12px',fontSize:11,fontWeight:700}}>{a.signal}</span>
            </div>
            <p style={{fontSize:14,color:C.textMuted,lineHeight:1.6,marginBottom:20}}>{a.summary}</p>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:24}}>
              {a.products.map(p=><span key={p} style={{background:C.grayLight,color:C.grayMid,borderRadius:6,padding:'3px 10px',fontSize:12,fontWeight:600}}>{p}</span>)}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{color:C.orange,fontWeight:700,fontSize:13}}>View brief →</span>
              <span style={{fontSize:12,color:C.textMuted}}>{a.tasks.length} tasks · {a.contacts.length} contacts</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function Nav({page,setPage}) {
  return (
    <nav style={{background:C.dark,padding:'0 32px',height:56,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100}}>
      <button onClick={()=>setPage('home')} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:8}}>
        <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="16" fill={C.orange}/>
          <path d="M8 22L16 10L24 22" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        <span style={{color:C.white,fontWeight:700,fontSize:16}}>Prospect Hub</span>
      </button>
      <div style={{display:'flex',gap:6}}>
        {Object.values(ACCOUNTS).map(a=>(
          <button key={a.id} className="tab-btn" onClick={()=>setPage(a.id)}
            style={{background:page===a.id?C.orange:'transparent',color:page===a.id?C.white:'#999',border:`1px solid ${page===a.id?C.orange:'#333'}`}}>
            {a.name}
          </button>
        ))}
      </div>
    </nav>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [page,setPage]=useState('home');
  const acct = ACCOUNTS[page];
  return (
    <div>
      <Nav page={page} setPage={setPage}/>
      {page==='home' ? <HomePage setPage={setPage}/> : <AccountPage acct={acct}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
